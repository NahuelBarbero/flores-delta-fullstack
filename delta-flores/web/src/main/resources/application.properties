spring.application.name=web
logging.level.org.springframework=error
logging.level.web=error
logging.level.org.springdoc=DEBUG

app.service.host=${DB_HOST:localhost}

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flores_delta_db}?sessionTimezone=UTC
spring.datasource.username=${DB_USERNAME:flores_user}
spring.datasource.password=${DB_PASSWORD:changeme}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# MinIO Configuration
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access.key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret.key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket.name=${MINIO_BUCKET_NAME:flores-delta-media}

# Perfil de Spring activo (minio por defecto, cambiar a gcs para Google Cloud)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:minio}

# --- Propiedades para Google Cloud Storage (perfil 'gcs') ---
# spring.cloud.gcp.storage.project-id=tu-gcp-project-id
# spring.cloud.gcp.storage.credentials.location=classpath:gcp-credentials.json
# gcs.bucket.name=tu-gcs-bucket-name

jwt.secret=${JWT_SECRET:asupersecretkeythatisverylongandsecure}
jwt.expiration.ms=${JWT_EXPIRATION:31536000000}


